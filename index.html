<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cream: #f5f1ea; --surface: #faf7f2; --border: #ddd8cf; --border-light: #e8e2d8;
  --gold: #a07840; --gold-light: #c49a5a; --gold-dim: #c8a96e; --gold-pale: #e8d5b0;
  --ink: #0a0806; --ink-mid: #111111; --muted: #555555; --muted-light: #666666;
}
html, body { min-height:100vh; background:var(--cream); display:flex; align-items:flex-start; justify-content:center; font-family:'Montserrat',sans-serif; padding:8px; position:relative; overflow:hidden; }
#particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
.scene { width:100%; max-width:100%; position:relative; z-index:2; }
.card { position:relative; width:100%; background:var(--surface); border:1px solid var(--border); border-radius:2px; overflow:hidden; box-shadow:0 1px 0 rgba(255,255,255,0.9) inset,0 20px 60px rgba(80,60,20,0.12),0 4px 16px rgba(80,60,20,0.08); animation:cardIn 1.2s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
@keyframes cardIn { from{opacity:0;transform:translateY(28px) scale(0.98)} to{opacity:1;transform:translateY(0) scale(1)} }
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent 0%,var(--gold-pale) 20%,var(--gold-dim) 40%,var(--gold) 50%,var(--gold-dim) 60%,var(--gold-pale) 80%,transparent 100%); z-index:10; }
.card-header { padding:44px 44px 28px; border-bottom:1px solid var(--border-light); }
.brand-mark { display:flex; align-items:center; gap:10px; margin-bottom:24px; animation:fadeUp 0.9s 0.3s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.brand-diamond { width:5px; height:5px; background:var(--gold); transform:rotate(45deg); flex-shrink:0; }
.brand-name { font-size:8.5px; font-weight:500; letter-spacing:0.38em; color:var(--gold); text-transform:uppercase; }
.name-block { animation:fadeUp 0.9s 0.45s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
.name-full { font-family:'Cormorant Garamond',serif; font-size:54px; font-weight:300; color:var(--ink); line-height:1.0; }
.name-full em { font-style:italic; color:var(--gold); }
.role-line { display:flex; align-items:center; gap:12px; margin-top:9px; }
.role-text { font-size:9px; font-weight:300; letter-spacing:0.3em; color:var(--muted); text-transform:uppercase; }
.role-rule { flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
.card-body { display:grid; grid-template-columns:1fr; }
.contact-section { padding:28px 44px 32px; border-bottom:1px solid var(--border-light); animation:fadeUp 0.9s 0.6s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
.section-label { font-size:7px; font-weight:500; letter-spacing:0.42em; color:var(--gold-dim); text-transform:uppercase; margin-bottom:18px; }
.contact-item { display:flex; align-items:flex-start; gap:11px; margin-bottom:13px; }
.contact-item:last-child { margin-bottom:0; }
.ci-icon { margin-top:2px; flex-shrink:0; opacity:0.45; }
.ci-icon svg { width:12px; height:12px; fill:var(--gold); display:block; }
.ci-data { display:flex; flex-direction:column; gap:1px; }
.ci-label { font-size:7px; font-weight:400; letter-spacing:0.26em; color:var(--muted-light); text-transform:uppercase; }
.ci-value { font-size:13px; font-weight:300; color:var(--ink-mid); text-decoration:none; transition:color 0.2s; }
.ci-value:hover { color:var(--gold); }
.qr-section { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:28px 22px; animation:fadeUp 0.9s 0.75s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; }
.qr-frame { position:relative; padding:8px; background:white; border:1px solid var(--border-light); }
.qr-frame::before,.qr-frame::after,.qr-frame .corner-tr,.qr-frame .corner-bl { content:''; position:absolute; width:9px; height:9px; border-color:var(--gold-dim); border-style:solid; }
.qr-frame::before { top:-1px; left:-1px; border-width:1.5px 0 0 1.5px; }
.qr-frame::after { bottom:-1px; right:-1px; border-width:0 1.5px 1.5px 0; }
.qr-frame .corner-tr { top:-1px; right:-1px; border-width:1.5px 1.5px 0 0; }
.qr-frame .corner-bl { bottom:-1px; left:-1px; border-width:0 0 1.5px 1.5px; }
.qr-caption { font-size:7px; font-weight:400; letter-spacing:0.3em; color:var(--muted-light); text-transform:uppercase; text-align:center; }
.card-footer { padding:16px 44px 20px; border-top:1px solid var(--border-light); display:flex; align-items:center; justify-content:space-between; animation:fadeUp 0.9s 0.9s cubic-bezier(0.16,1,0.3,1) forwards; opacity:0; position:relative; }
.card-footer::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1.5px; background:linear-gradient(90deg,transparent,var(--gold-pale) 30%,var(--gold-dim) 50%,var(--gold-pale) 70%,transparent); }
.footer-tagline { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:300; font-style:italic; color:var(--muted); }
.footer-badge { display:flex; align-items:center; gap:6px; }
.badge-dot { width:4px; height:4px; background:var(--gold); border-radius:50%; animation:pulse 3s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }
.badge-text { font-size:7px; font-weight:400; letter-spacing:0.32em; color:var(--muted-light); text-transform:uppercase; }
</style>
</head>

resize();
window.addEventListener('resize', resize);
var GOLD_COLORS = [[160,120,64],[196,154,90],[200,169,110],[232,213,176],[180,140,80]];
function Particle(init) { this.reset(init); }
Particle.prototype.reset = function(init) {
  this.x = Math.random() * canvas.width;
  this.y = init ? Math.random() * canvas.height : canvas.height + 12;
  this.r = Math.random() * 1.6 + 0.3;
  this.vx = (Math.random() - 0.5) * 0.3;
  this.vy = -(Math.random() * 0.45 + 0.12);
  this.life = 0;
  this.maxLife = Math.random() * 300 + 180;
  this.col = GOLD_COLORS[Math.floor(Math.random() * GOLD_COLORS.length)];
  this.phase = Math.random() * Math.PI * 2;
  this.speed = 0.012 + Math.random() * 0.02;
  this.shape = Math.random() < 0.2 ? 'diamond' : 'circle';
};
Particle.prototype.update = function() {
  this.x += this.vx; this.y += this.vy; this.life++; this.phase += this.speed;
  if (this.life > this.maxLife || this.y < -12) this.reset(false);
};
Particle.prototype.draw = function() {
  var t = this.life / this.maxLife;
  var env = t < 0.12 ? t/0.12 : t > 0.78 ? 1-(t-0.78)/0.22 : 1;
  var a = env * (0.5 + 0.5 * Math.sin(this.phase));
  var r = this.col[0], g = this.col[1], b = this.col[2];
  ctx.save();
  ctx.globalAlpha = a;
  if (this.shape === 'diamond') {
    var s = this.r * 2.4;
    ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
    ctx.beginPath();
    ctx.moveTo(this.x, this.y - s); ctx.lineTo(this.x + s, this.y);
    ctx.lineTo(this.x, this.y + s); ctx.lineTo(this.x - s, this.y);
    ctx.closePath(); ctx.fill();
  } else {
    var rad = this.r * 2.8;
    var g2 = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, rad);
    g2.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')');
    g2.addColorStop(0.5, 'rgba(' + r + ',' + g + ',' + b + ',' + (a*0.4) + ')');
    g2.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(this.x, this.y, rad, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
};
var particles = [];
for (var i = 0; i < 40; i++) particles.push(new Particle(true));
(function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
  requestAnimationFrame(loop);
})();
</script>
